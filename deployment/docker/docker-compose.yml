# ==========================================
# 🐳 Docker Compose para DespFinancee
# Configuração completa para desenvolvimento e produção
# ==========================================

version: "3.8"

services:
  # � Backend API
  backend:
    build:
      context: ../../backend
      dockerfile: ../deployment/docker/Dockerfile.backend
      target: ${NODE_ENV:-development}
    container_name: despfinancee-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your_refresh_secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - ../../backend:/app
      - /app/node_modules
      - backend_logs:/app/logs
    networks:
      - despfinancee-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 🎨 Frontend React
  frontend:
    build:
      context: ../../frontend
      dockerfile: ../deployment/docker/Dockerfile.frontend
      target: ${NODE_ENV:-development}
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    container_name: despfinancee-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/dist
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - despfinancee-network

  # 📊 Redis Cache (Opcional para produção)
  redis:
    image: redis:7.2-alpine
    container_name: despfinancee-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - despfinancee-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - production

  # 🔍 Nginx Reverse Proxy (Produção)
  nginx:
    image: nginx:alpine
    container_name: despfinancee-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../deployment/docker/ssl:/etc/nginx/ssl:ro
      - frontend_dist:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend
    networks:
      - despfinancee-network
    profiles:
      - production

volumes:
  backend_logs:
    driver: local
  redis_data:
    driver: local
  frontend_dist:
    driver: local

networks:
  despfinancee-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
